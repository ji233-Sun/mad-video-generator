<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI 图片翻转视频生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 640px; margin: 0 auto; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        .section { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        label { display: block; margin-bottom: .5rem; font-weight: 600; }
        input[type="file"] { margin-bottom: 1rem; }
        button { background: #4a90d9; color: #fff; border: none; padding: .6rem 1.4rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:disabled { opacity: .5; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #357abd; }
        .track-list { list-style: none; margin: .5rem 0; }
        .track-list li { padding: .4rem 0; }
        .track-list label { font-weight: normal; display: inline; cursor: pointer; }
        #status { margin-top: 1rem; color: #666; }
        a.download { display: inline-block; margin-top: 1rem; color: #4a90d9; font-weight: 600; text-decoration: none; }
        a.download:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>MIDI 图片翻转视频生成器</h1>

    <div class="section">
        <label for="midi">MIDI 文件</label>
        <input type="file" id="midi" accept=".mid,.midi">
        <label for="image">图片</label>
        <input type="file" id="image" accept="image/*">
        <button id="uploadBtn" onclick="upload()">上传</button>
    </div>

    <div class="section" id="trackSection" style="display:none">
        <label>选择轨道</label>
        <ul class="track-list" id="trackList"></ul>
        <button id="generateBtn" onclick="generate()">生成视频</button>
    </div>

    <div id="status"></div>
    <div id="result"></div>

    <script>
        let sessionId = null;

        async function upload() {
            const midi = document.getElementById('midi').files[0];
            const image = document.getElementById('image').files[0];
            if (!midi || !image) { alert('请选择 MIDI 文件和图片'); return; }

            const fd = new FormData();
            fd.append('midi', midi);
            fd.append('image', image);

            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('status').textContent = '上传中...';
            document.getElementById('result').innerHTML = '';
            document.getElementById('trackSection').style.display = 'none';

            try {
                const res = await fetch('/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }

                sessionId = data.session_id;
                const list = document.getElementById('trackList');
                list.innerHTML = '';
                data.tracks.forEach(t => {
                    const li = document.createElement('li');
                    li.innerHTML = `<label><input type="radio" name="track" value="${t.index}"> ${t.name}（${t.notes} 个音符）</label>`;
                    list.appendChild(li);
                });
                // 默认选中第一个有音符的轨道
                const first = data.tracks.find(t => t.notes > 0);
                if (first) {
                    const radio = list.querySelector(`input[value="${first.index}"]`);
                    if (radio) radio.checked = true;
                }
                document.getElementById('trackSection').style.display = '';
                document.getElementById('status').textContent = '请选择轨道后点击生成';
            } catch (e) {
                alert('上传失败: ' + e.message);
            } finally {
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        async function generate() {
            const selected = document.querySelector('input[name="track"]:checked');
            if (!selected) { alert('请选择一个轨道'); return; }

            document.getElementById('generateBtn').disabled = true;
            document.getElementById('status').textContent = '生成中，请稍候...';
            document.getElementById('result').innerHTML = '';

            try {
                const res = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, track_index: parseInt(selected.value) })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error); return; }

                document.getElementById('status').textContent = '生成完成！';
                document.getElementById('result').innerHTML = `<a class="download" href="/download/${data.filename}" download>下载视频</a>`;
            } catch (e) {
                alert('生成失败: ' + e.message);
            } finally {
                document.getElementById('generateBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
